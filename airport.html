<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Airport Taxi | Get Taxi Kovai</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary-dark: #0a0b16; --primary-yellow: #ffcc00; --bg-light: #f5f6fa; --text-dark: #1e293b; --text-light: #ffffff; --text-muted: #94a3b8; --wa-green: #25d366; --border-radius-lg: 30px; --border-radius-md: 12px; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background-color: var(--primary-dark); color: var(--text-light); display: flex; justify-content: center; }
        .app-container { width: 100%; max-width: 480px; background-color: var(--primary-dark); position: relative; min-height: 100vh; padding-bottom: 90px; }
        header { display: flex; justify-content: space-between; align-items: center; padding: 20px; position: sticky; top: 0; background: rgba(10, 11, 22, 0.95); z-index: 100; }
        .logo { display: flex; align-items: center; gap: 10px; font-weight: 800; font-size: 1.2rem; text-decoration: none; color: white;}
        .logo-icon { background: var(--primary-yellow); color: var(--primary-dark); padding: 8px 12px; border-radius: 8px; font-size: 1.2rem; }
        .hero { padding: 20px 20px 40px; text-align: center; }
        .badge { display: inline-block; border: 1px solid rgba(255, 204, 0, 0.3); color: var(--primary-yellow); padding: 6px 16px; border-radius: 20px; font-size: 0.7rem; font-weight: 600; margin-bottom: 20px; background: rgba(255, 204, 0, 0.05); }
        .hero h1 { font-size: 1.85rem; font-weight: 800; line-height: 1.25; margin-bottom: 15px; }
        .hero h1 span { color: var(--primary-yellow); }
        .booking-widget { background: #ffffff; border-radius: var(--border-radius-lg) var(--border-radius-lg) 0 0; padding: 40px 20px; color: var(--text-dark); }
        .widget-title { font-size: 1.1rem; font-weight: 800; color: var(--primary-dark); margin-bottom: 20px; text-align: center; }
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; font-size: 0.75rem; color: var(--text-muted); font-weight: 600; margin-bottom: 8px; }
        .input-field { width: 100%; background: var(--bg-light); border: none; padding: 16px; border-radius: 12px; font-size: 0.95rem; font-weight: 500; color: var(--text-dark); outline: none; }
        .btn-quote { width: 100%; background: #f8c966; color: #8c6a26; border: none; padding: 18px; border-radius: var(--border-radius-md); font-size: 0.95rem; font-weight: 700; cursor: pointer; margin-top: 15px;}
        .fixed-bottom { position: fixed; bottom: 0; width: 100%; max-width: 480px; background: #ffffff; padding: 15px 20px; display: flex; gap: 15px; box-shadow: 0 -5px 20px rgba(0,0,0,0.05); z-index: 90; }
        .btn-main-call { flex: 1; background: var(--primary-dark); color: #ffffff; border: none; border-radius: 16px; font-size: 1rem; font-weight: 600; display: flex; justify-content: center; align-items: center; gap: 10px; text-decoration: none; }
        .btn-whatsapp { width: 60px; height: 60px; background: var(--wa-green); color: white; border: none; border-radius: 16px; display: flex; justify-content: center; align-items: center; font-size: 1.5rem; text-decoration: none; }
    </style>
</head>
<body>
<div class="app-container">
    <header><a href="index.html" class="logo"><div class="logo-icon">←</div>BACK</a></header>
    <section class="hero">
        <div class="badge">✈️ PUNCTUAL 24/7 SERVICE</div>
        <h1>AIRPORT <br><span>TRANSFERS</span></h1>
        <p>Pre-book your taxi to or from Coimbatore International Airport (CJB).</p>
    </section>
    <section class="booking-widget">
        <h2 class="widget-title">Flight Pickup / Drop</h2>
        <div class="input-group">
            <label>📍 Pickup Location</label>
            <input type="text" id="pickup-input" class="input-field" value="Coimbatore Airport (CJB)">
        </div>
        <div class="input-group">
            <label>🔺 Drop Location</label>
            <input type="text" id="drop-input" class="input-field" placeholder="Where to?">
        </div>
        <button class="btn-quote" onclick="sendAirportQuote()">BOOK AIRPORT TAXI 💬</button>
    </section>
    <div class="fixed-bottom">
        <a href="tel:+919043743777" class="btn-main-call">📞 CALL NOW</a>
        <a href="https://wa.me/919043743777" class="btn-whatsapp">💬</a>
    </div>
</div>
<script>
    function sendAirportQuote() {
        const pickup = document.getElementById('pickup-input').value || "Not specified";
        const drop = document.getElementById('drop-input').value || "Not specified";
        const message = `Hello! ✈️\nI need an Airport Taxi:\n\n*Pickup:* ${pickup}\n*Drop:* ${drop}\n\nPlease share availability and fare.`;
        window.open(`https://wa.me/919043743777?text=${encodeURIComponent(message)}`, '_blank');
    }
</script>
</body>
</html>
